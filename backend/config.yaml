audio_parameters:
  channels: 1
  sample_rate: 16000
  sample_width: 2
auth:
  api_key: ""
  enabled: false
cleanup_parameters:
  cleanup_interval_seconds: 300
  job_retention_minutes: 120
  session_ttl_minutes: 60
cors:
  allow_credentials: true
  allow_headers:
    - "*"
  allow_methods:
    - "*"
  allow_origins:
    - "*"
  enabled: true
preload_models:
  device: cpu
  enabled: false
  models: []
rate_limiting:
  enabled: true
  requests_per_minute: 100
  trusted_proxies: []
  uploads_per_minute: 10
  websocket_connections_per_ip: 5
transcription_parameters:
  context_max_length: 224
  word_timestamps: false
upload_parameters:
  max_file_size_mb: 100
vad_parameters:
  batch_min_duration: 1.0
  batch_short_utterances: true
  min_speech_duration: 0.3
  prob_threshold: 0.6
  silence_duration: 0.7
