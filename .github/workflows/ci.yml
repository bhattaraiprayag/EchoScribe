name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Format with Ruff
        run: uv run ruff format --check .

      # Prettier check using pre-commit or direct run functionality if possible.
      # Since we don't have a package.json, we can use pre-commit to run prettier or just rely on ruff for python.
      # Let's run pre-commit for all checks to ensure consistency.
      - name: Run Pre-commit hooks
        run: |
          uv run pre-commit install
          uv run pre-commit run --all-files --show-diff-on-failure

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Tests with Coverage
        run: uv run pytest --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Startup Smoke Check
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          status=0
          timeout 25 uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 >"$log_file" 2>&1 || status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat "$log_file"
            exit "$status"
          fi
          grep -q "Application startup complete" "$log_file"
          rm -f "$log_file"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - name: Check initial disk space
        run: df -h

      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: echoscribe:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check final disk space
        run: df -h
